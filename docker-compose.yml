version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: archflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-archflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archflow_net

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: archflow_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-archflow_redis_secret} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-archflow_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archflow_net

  # ─── pgAdmin (optional, comment out in prod) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: archflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@archflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - archflow_net
    profiles:
      - tools

# ─── Volumes & Networks ──────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

networks:
  archflow_net:
    driver: bridge
